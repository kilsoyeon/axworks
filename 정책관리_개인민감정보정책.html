<!--체크박스 랩 (천문연)-->
<script>
document.querySelectorAll('.check-box-wrap').forEach(wrap => {
  wrap.addEventListener('click', (e) => {
    // input이나 label을 직접 클릭한 경우 기본 동작 유지
    if (e.target.matches('input, label')) return;

    const checkbox = wrap.querySelector('.form-check-input');
    checkbox.checked = !checkbox.checked;
    checkbox.dispatchEvent(new Event('change')); // 선택 상태 갱신
  });
});


</script>
